<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Question For You ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #ffe5ec, #ffb3c6); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }
        .card { background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; z-index: 5; }
        .heart-icon { font-size: 50px; margin-bottom: 15px; display: inline-block; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        h2 { color: #d90429; margin-bottom: 30px; font-size: 24px; }
        .btn-container { display: flex; justify-content: space-around; align-items: center; position: relative; height: 100px; width: 100%; }
        button { padding: 15px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.15); }
        #gfBtn { background: linear-gradient(45deg, #ff477e, #ff7096); color: white; z-index: 10; }
        #bestieBtn { background-color: #8d99ae; color: white; z-index: 20; transition: all 0.1s ease-out; }
        .hidden { display: none !important; }
        .date-input { padding: 12px; font-size: 16px; border: 2px solid #ff477e; border-radius: 10px; margin-bottom: 20px; width: 80%; text-align: center; font-weight: bold; }
        .success-msg { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <!-- Page 1: द सवाल -->
    <div id="page1" class="card">
        <div class="heart-icon">❤️</div>
        <h2>Aap Shahid ki kya banna chahti hain? 😉 👀</h2>
        <div class="btn-container">
            <button id="gfBtn" onclick="selectGf()">GF 💖</button>
            <button id="bestieBtn" onmouseover="moveButton()" ontouchstart="moveButton(event)" onclick="moveButton(event)">Bestie 🤝</button>
        </div>
    </div>

    <!-- Page 2: डेट फिक्सिंग -->
    <div id="page2" class="card hidden">
        <div class="heart-icon">🎉</div>
        <h2>Congratulations!</h2>
        <p style="font-size: 18px; margin-bottom: 20px; color: #495057;">Aap Shahid ki official GF ban gayi ho! 🥰</p>
        <hr style="border: 0; height: 1px; background: #ddd; margin-bottom: 20px;">
        
        <h2>Aap date pe chai pine kab jao gee? ☕</h2>
        
        <!-- गुप्त फॉर्म जो ईमेल भेजेगा -->
        <form id="prankForm" action="https://formspree.io/f/xvzeowdw" method="POST" onsubmit="event.preventDefault(); fixDate();">
            <input type="date" name="Chai_Date" id="datePicker" class="date-input" required>
            <br>
            <button type="submit" id="gfBtn">Confirm Date 💖</button>
        </form>
        
        <div id="finalMessage" class="success-msg hidden"></div>
    </div>

    <script>
        function moveButton(e) {
            if(e) e.preventDefault();
            const btn = document.getElementById('bestieBtn');
            const padding = 50;
            const maxX = window.innerWidth - btn.clientWidth - padding;
            const maxY = window.innerHeight - btn.clientHeight - padding;
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function selectGf() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function fixDate() {
            const dateValue = document.getElementById('datePicker').value;
            const finalMsg = document.getElementById('finalMessage');
            const form = document.getElementById('prankForm');
            
            const dateObj = new Date(dateValue);
            const formattedDate = dateObj.toLocaleDateString('hi-IN', { day: 'numeric', month: 'long', year: 'numeric' });

            // चुपके से Formspree पर डेटा भेजना
            const formData = new FormData(form);
            fetch(form.action, {
                method: form.method,
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            // स्क्रीन पर सक्सेस मैसेज दिखाना
            form.classList.add('hidden');
            finalMsg.innerHTML = `✅ Confirm ho gaya! <br> 🥰 ${formattedDate} ko Shahid ke sath chai pakki! ☕`;
            finalMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
